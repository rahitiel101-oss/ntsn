<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ビジュアルノベル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:manipulation;}
#rotate-msg{display:none;position:fixed;inset:0;background:#000;color:#c8a830;font-family:sans-serif;font-size:18px;align-items:center;justify-content:center;text-align:center;z-index:100;}
@media(orientation:portrait){#rotate-msg{display:flex;}#vn{display:none;}}
#vn{position:fixed;top:0;left:0;right:0;bottom:0;cursor:pointer;-webkit-tap-highlight-color:transparent;}
#bg{position:absolute;inset:0;background-size:cover;background-position:center;background-color:#1a1228;}
#bg.search{background-size:contain;background-repeat:no-repeat;background-color:#111;}
#cc{position:absolute;inset:0;pointer-events:none;}

/* 通常ダイアログ */
#db{position:absolute;bottom:0;left:0;right:0;height:45vh;padding:0 2vw 1.5vh;display:flex;flex-direction:column;}
#nt{font-family:'Noto Serif JP',serif;font-weight:600;font-size:2.4vw;padding:.3vh 1.5vw;letter-spacing:.1em;border-radius:5px 5px 0 0;border:3px solid #c8a830;border-bottom:none;align-self:flex-start;margin-left:2vw;z-index:2;position:relative;white-space:nowrap;display:inline-block;}
#nt.h{display:none;}
#di{position:absolute;bottom:1.5vh;left:2vw;right:2vw;top:0;background:rgba(14,10,24,0.95);border:3px solid #c8a830;border-radius:0 8px 8px 8px;padding:1.5vh 2vw 2.5vh;z-index:2;}
#dt{font-family:'Noto Serif JP',serif;font-size:2.2vw;color:#f0eaf5;line-height:1.85;letter-spacing:.04em;white-space:pre-wrap;}
#ni{position:absolute;bottom:.8vh;right:1.2vw;width:1vw;height:1vw;min-width:7px;min-height:7px;border-right:2px solid #c8a830;border-bottom:2px solid #c8a830;transform:rotate(45deg);animation:bn .8s infinite alternate;}
@keyframes bn{from{transform:rotate(45deg) translateY(-2px);opacity:.4;}to{transform:rotate(45deg) translateY(2px);opacity:1;}}

/* 場面タイトル */
#sc{position:absolute;top:1.5vh;left:50%;transform:translateX(-50%);background:rgba(14,10,24,.85);color:rgba(200,168,80,.95);font-family:'Noto Serif JP',serif;font-size:2vw;letter-spacing:.2em;padding:.4vh 1.8vw;border:1px solid rgba(200,168,48,.5);border-radius:2px;pointer-events:none;white-space:nowrap;z-index:3;}
#sc.h{display:none;}

/* SEARCH MODE 演出オーバーレイ */
#search-splash{
  position:absolute;inset:0;background:rgba(0,0,0,0.85);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:20;opacity:0;pointer-events:none;
  transition:opacity 0.4s;
}
#search-splash.show{opacity:1;pointer-events:auto;}
#search-splash-title{
  color:#c8a830;font-family:'Noto Serif JP',serif;
  font-size:6vw;letter-spacing:.4em;
  text-shadow:0 0 20px rgba(200,168,48,0.8);
}
#search-splash-sub{
  color:rgba(220,80,60,0.9);font-family:'Noto Serif JP',serif;
  font-size:2vw;letter-spacing:.15em;margin-top:1.5vh;
}

/* サーチヒント */
#search-hint{position:absolute;top:calc(1.5vh + 3.5vw);left:50%;transform:translateX(-50%);background:rgba(14,10,24,.82);color:rgba(220,80,60,0.95);font-family:'Noto Serif JP',serif;font-size:1.6vw;letter-spacing:.1em;padding:.3vh 1.8vw;border:1px solid rgba(200,168,48,.3);border-radius:2px;pointer-events:none;white-space:nowrap;z-index:3;display:none;}

/* タップ光エフェクト */
#ripple{position:absolute;border-radius:50%;width:100px;height:100px;pointer-events:none;display:none;z-index:5;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(255,240,100,0.8) 0%,rgba(255,240,100,0) 70%);}
#ripple.pop{display:block;animation:pop 0.5s ease-out forwards;}
@keyframes pop{0%{opacity:1;transform:translate(-50%,-50%) scale(0.1);}100%{opacity:0;transform:translate(-50%,-50%) scale(3);}}

/* 発見マーク */
.fmark{position:absolute;width:2.5vw;height:2.5vw;min-width:14px;min-height:14px;border-radius:50%;border:2px solid rgba(200,168,48,0.9);background:rgba(200,168,48,0.3);pointer-events:none;z-index:4;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;color:rgba(200,168,48,1);font-size:1.4vw;font-weight:bold;}

/* サーチダイアログ */
#sdlg{position:absolute;bottom:0;left:0;right:0;padding:0 2vw 1.5vh;z-index:6;display:none;}
#sdlg.show{display:block;}
#sdlg-box{background:rgba(14,10,24,0.95);border:3px solid #c8a830;border-radius:8px;padding:1.8vh 4vw 1.8vh 2.5vw;position:relative;}
#sdlg-text{font-family:'Noto Serif JP',serif;font-size:2.2vw;color:#f0eaf5;line-height:1.85;letter-spacing:.04em;white-space:pre-wrap;}
#sdlg-x{position:absolute;top:.8vh;right:1vw;color:rgba(200,168,80,.9);font-size:3vw;line-height:1;padding:.3vh .6vw;cursor:pointer;}
#next-search-btn{display:none;margin-top:1vh;float:right;background:rgba(200,168,48,0.15);border:2px solid #c8a830;color:#c8a830;font-family:'Noto Serif JP',serif;font-size:2vw;letter-spacing:.15em;padding:.5vh 2.5vw;border-radius:4px;cursor:pointer;}
#next-search-btn.show{display:block;}

/* 選択肢UI */
#choice-wrap{
  position:absolute;inset:0;
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:2vh;z-index:7;
  background:rgba(0,0,0,0.5);
}
#choice-wrap.show{display:flex;}
.choice-btn{
  background:rgba(14,10,24,0.95);
  border:2px solid #c8a830;
  color:#f0eaf5;
  font-family:'Noto Serif JP',serif;
  font-size:2.4vw;
  letter-spacing:.06em;
  padding:1.5vh 4vw;
  border-radius:6px;
  cursor:pointer;
  width:70%;
  text-align:left;
  transition:background 0.2s;
}
.choice-btn:before{content:"▶ ";color:#c8a830;}

#ov{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity .7s;z-index:10;}
#ov.f{opacity:1;}
</style>
</head>
<body>
<div id="rotate-msg">📱 端末を横向きにしてください</div>
<div id="vn">
  <div id="bg"></div>
  <canvas id="cc"></canvas>
  <div id="sc" class="h"></div>
  <div id="search-hint">気になるところをタップしよう</div>
  <div id="ripple"></div>
  <div id="search-splash">
    <div id="search-splash-title">SEARCH MODE</div>
    <div id="search-splash-sub">気になるところをタップしよう</div>
  </div>
  <div id="db">
    <div id="nt" class="h"></div>
    <div id="di"><div id="dt"></div><div id="ni"></div></div>
  </div>
  <div id="sdlg">
    <div id="sdlg-box">
      <div id="sdlg-x">✕</div>
      <div id="sdlg-text"></div>
    </div>
    <button id="next-search-btn">次へ進む ▶</button>
  </div>
  <div id="choice-wrap"></div>
  <div id="ov"></div>
</div>

  bg.className=scene==="search"?"search":"";
  if(scene==="principal")bg.style.backgroundImage="url("+BG_P+")";
  else if(scene==="workshop")bg.style.backgroundImage="url("+BG_W+")";
  else if(scene==="search")bg.style.backgroundImage="url("+BG_GUN+")";
  else{bg.style.backgroundImage="none";bg.style.backgroundColor="#000";}
}

function drawChars(i){
  var s=currentSC[i],w=cc.width,h=cc.height;
  ctx.clearRect(0,0,w,h);
  if(!s||s.search||s.choice||!s.chars||!s.chars.length)return;
  var dialogTop=getDialogTop(),titleBottom=getSceneTitleBottom();
  for(var j=0;j<s.chars.length;j++){drawSil(w/2,dialogTop,titleBottom,w,h,s.speaker===CL[s.chars[j]]);}
}

function drawSil(ox,bot,minTop,w,h,active){
  ctx.save();ctx.fillStyle="#080808";ctx.globalAlpha=active?0.88:0.35;
  var fh=w*0.52,fw=fh*0.38,ft=bot-fh*0.68;
  if(ft<minTop)ft=minTop;
  var hh=fh*0.17,hcy=ft+hh*0.52;
  ctx.beginPath();ctx.ellipse(ox,hcy,fw*0.25,hh/2,0,0,Math.PI*2);ctx.fill();
  var nw=fw*0.14,nt2=ft+hh*0.88,nb=ft+hh*1.08;ctx.fillRect(ox-nw/2,nt2,nw,nb-nt2);
  var tt=nb,tb=ft+fh*0.60,sw=fw*0.80,ww=fw*0.68;
  ctx.beginPath();ctx.moveTo(ox-sw/2,tt);ctx.lineTo(ox+sw/2,tt);ctx.lineTo(ox+ww/2,tb);ctx.lineTo(ox-ww/2,tb);ctx.closePath();ctx.fill();
  var aw=fw*0.13,at=tt+(tb-tt)*0.04,ab=tb+fh*0.10;
  ctx.beginPath();ctx.moveTo(ox-sw/2,at);ctx.lineTo(ox-sw/2-aw,at);ctx.lineTo(ox-sw/2-aw*0.7,ab);ctx.lineTo(ox-sw/2+aw*0.3,ab);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(ox+sw/2,at);ctx.lineTo(ox+sw/2+aw,at);ctx.lineTo(ox+sw/2+aw*0.7,ab);ctx.lineTo(ox+sw/2-aw*0.3,ab);ctx.closePath();ctx.fill();
  var ht=tb,hb=ft+fh*0.68;ctx.fillRect(ox-fw*0.36,ht,fw*0.72,hb-ht);
  var lw=fw*0.28,lg=fw*0.06;ctx.fillRect(ox-lg/2-lw,hb,lw,bot-hb);ctx.fillRect(ox+lg/2,hb,lw,bot-hb);
  ctx.restore();
}

/* サーチ系 */
function getImgRect(){
  var vw=vn.offsetWidth,vh=vn.offsetHeight,ba=vw/vh,ia=IMG_ASPECT,dw,dh,ox,oy;
  if(ba>ia){dh=vh;dw=vh*ia;ox=(vw-dw)/2;oy=0;}else{dw=vw;dh=vw/ia;ox=0;oy=(vh-dh)/2;}
  return{x:ox,y:oy,w:dw,h:dh};
}
function hitZone(px,py,zones){
  var r=getImgRect(),rx=(px-r.x)/r.w,ry=(py-r.y)/r.h;
  if(rx<0||rx>1||ry<0||ry>1)return null;
  for(var i=0;i<zones.length;i++){var z=zones[i];if(rx>=z.x1&&rx<=z.x2&&ry>=z.y1&&ry<=z.y2)return z;}
  return null;
}
function showRipple(px,py){rpl.style.left=px+"px";rpl.style.top=py+"px";rpl.classList.remove("pop");void rpl.offsetWidth;rpl.classList.add("pop");}
function addMark(z){
  var r=getImgRect(),cx=r.x+r.w*(z.x1+z.x2)/2,cy=r.y+r.h*(z.y1+z.y2)/2;
  var mk=document.createElement("div");mk.className="fmark";mk.style.left=cx+"px";mk.style.top=cy+"px";mk.textContent="✓";vn.appendChild(mk);
}
function openSdlg(text){sdlgT.textContent=text;sdlg.classList.add("show");sdlgOpen=true;}
function closeSdlg(){sdlg.classList.remove("show");sdlgOpen=false;}
function clearMarks(){var ms=vn.querySelectorAll(".fmark");for(var i=0;i<ms.length;i++)ms[i].remove();}

/* タイプライター */
function typeText(text){
  if(tid){clearInterval(tid);tid=null;}
  dt.textContent="";var i=0;typing=true;
  tid=setInterval(function(){
    if(i<text.length){dt.textContent+=text[i];i++;}
    else{clearInterval(tid);tid=null;typing=false;}
  },text.length>40?26:38);
}

/* 選択肢表示 */
function showChoice(s){
  choiceWrap.innerHTML="";
  for(var i=0;i<s.options.length;i++){
    (function(opt){
      var btn=document.createElement("button");
      btn.className="choice-btn";
      btn.textContent=opt.label;
      var chosen=false;
      function doSelect(){
        if(chosen)return;
        chosen=true;
        selectChoice(opt);
      }
      btn.addEventListener("touchend",function(e){ doSelect(); });
      btn.addEventListener("click",function(e){ doSelect(); });
      choiceWrap.appendChild(btn);
    })(s.options[i]);
  }
  choiceWrap.classList.add("show");
}

function selectChoice(opt){
  choiceWrap.classList.remove("show");
  choiceWrap.innerHTML="";
  currentSC=opt.branch;
  step=0;
  blockTap=true;
  setTimeout(function(){ blockTap=false; show(0); }, 600);
}

/* ステップ表示 */
function go(i){
  var s=currentSC[i];
  if(!s)return;

  // 選択肢
  if(s.choice){
    setBg(s.scene);
    db.style.display="none";cc.style.display="none";
    sc.textContent=s.title||"";
    if(s.title)sc.classList.remove("h");else sc.classList.add("h");
    showChoice(s);
    if(ov.classList.contains("f")){setTimeout(function(){ov.classList.remove("f");},50);}
    return;
  }

  // 調べるモード（SEARCH MODE演出付き）
  if(s.search){
    searchMode=true;sdlgOpen=false;searchFound={};clearMarks();
    db.style.display="none";cc.style.display="none";
    searchHint.style.display="none";
    sdlg.classList.remove("show");nSBtn.classList.remove("show");
    sc.textContent="SEARCH MODE";sc.classList.remove("h");
    setBg(s.scene);
    // スプラッシュ演出
    searchSplash.classList.add("show");
    setTimeout(function(){
      searchSplash.classList.remove("show");
      searchHint.style.display="block";
      if(ov.classList.contains("f")){setTimeout(function(){ov.classList.remove("f");},50);}
    },1500);
    if(ov.classList.contains("f")){setTimeout(function(){ov.classList.remove("f");},50);}
    return;
  }

  // 通常
  searchMode=false;
  db.style.display="";cc.style.display="";
  searchHint.style.display="none";
  searchSplash.classList.remove("show");
  if(s.title){sc.textContent=s.title;sc.classList.remove("h");}else{sc.classList.add("h");}
  if(s.speaker){
    var c=NC[s.speaker]||{b:"#2a2040",t:"#e0d8f0"};
    nt.textContent=s.speaker;nt.style.background=c.b;nt.style.color=c.t;
    nt.style.borderColor="#c8a830";nt.style.fontStyle=s.inner?"italic":"normal";
    nt.classList.remove("h");
  }else{nt.classList.add("h");}
  setBg(s.scene);
  typeText(s.text);
  requestAnimationFrame(function(){layoutDialog();drawChars(i);});
  if(ov.classList.contains("f")){setTimeout(function(){ov.classList.remove("f");},50);}
}

function show(i){
  if(i>=currentSC.length)return;
  var s=currentSC[i],prev=i>0?currentSC[i-1].scene:null;
  if(s.blackout){ov.classList.add("f");setTimeout(function(){step++;show(step);},1400);return;}
  if(prev&&prev!==s.scene&&!s.search&&!s.choice){ov.classList.add("f");setTimeout(function(){go(i);},700);}
  else{go(i);}
}

function handleTap(){
  if(blockTap)return;
  var px=tapX,py=tapY;

  // 選択肢表示中はボタンに任せる
  if(choiceWrap.classList.contains("show"))return;

  if(searchMode){
    var s=currentSC[step];
    if(sdlgOpen){
      var xr=sdlgX.getBoundingClientRect();
      if(px>=xr.left&&px<=xr.right&&py>=xr.top&&py<=xr.bottom){closeSdlg();return;}
      if(nSBtn.classList.contains("show")){
        var nr=nSBtn.getBoundingClientRect();
        if(px>=nr.left&&px<=nr.right&&py>=nr.top&&py<=nr.bottom){
          closeSdlg();clearMarks();step++;show(step);return;
        }
      }
      return;
    }
    // スプラッシュ中はタップ無効
    if(searchSplash.classList.contains("show"))return;
    showRipple(px,py);
    var z=hitZone(px,py,s.zones);
    if(z){
      if(!searchFound[z.id]){searchFound[z.id]=true;addMark(z);}
      openSdlg(z.text);
      if(z.isKey)nSBtn.classList.add("show");
    }
    return;
  }

  // 通常
  if(typing){if(tid){clearInterval(tid);tid=null;}dt.textContent=currentSC[step].text;typing=false;}
  else{step++;if(step<currentSC.length)show(step);}
}

vn.addEventListener("click",function(e){tapX=e.clientX;tapY=e.clientY;handleTap();});
vn.addEventListener("touchend",function(e){tapX=e.changedTouches[0].clientX;tapY=e.changedTouches[0].clientY;handleTap();},{passive:true});
window.addEventListener("resize",resize);
resize();
show(0);
</script>
