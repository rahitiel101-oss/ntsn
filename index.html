<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>タップテスト</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#111;overflow:hidden;}
#box{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;
}
#count{color:#c8a830;font-size:40px;font-family:sans-serif;}
#msg{color:#fff;font-size:20px;font-family:sans-serif;}
#dot{
  position:fixed;width:60px;height:60px;
  border-radius:50%;background:rgba(255,220,0,0.8);
  display:none;pointer-events:none;
  transform:translate(-50%,-50%);
}
</style>
</head>
<body>
<div id="box">
  <div id="count">0</div>
  <div id="msg">どこでもタップしてください</div>
</div>
<div id="dot"></div>
<script>
var n=0;
var dot=document.getElementById("dot");
var count=document.getElementById("count");

function tap(x,y){
  n++;
  count.textContent=n;
  dot.style.left=x+"px";
  dot.style.top=y+"px";
  dot.style.display="block";
  setTimeout(function(){dot.style.display="none";},400);
}

document.addEventListener("touchend",function(e){
  e.preventDefault();
  tap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
},{passive:false});

document.addEventListener("click",function(e){
  tap(e.clientX,e.clientY);
});
</script>
</body>
</html>
